[pytest]
# Without this, bare `pytest` (or `pytest tests/`) fails to collect any test
# in this repo with:
#   ImportError: attempted relative import with no known parent package
#
# Root cause (confirmed by tracing pytest's internals): pytest's package
# collection walks the repo root and finds __init__.py there (ComfyUI's
# required node-registration entry point, not a test artifact). It tries to
# import that file as part of building a Package collection node. Because
# this repo's directory name contains hyphens (not a valid Python
# identifier), pytest can't construct a qualified package name for it and
# falls back to importing __init__.py as a bare top-level module with no
# parent package -- which immediately fails on its `from .nodes...` import.
#
# consider_namespace_packages=true changes how pytest resolves the package
# root in this situation, avoiding that fallback. Confirmed empirically:
# --import-mode=importlib alone does NOT fix this; this setting does, with
# either import mode, for both `pytest` and `pytest tests/`. See
# CONTRIBUTING.md's Running Tests section.
consider_namespace_packages = true
